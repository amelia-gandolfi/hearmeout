<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEAR ME OUT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .splash-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    background: #FAFAF7;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
  }
  .splash-inner { max-width: 28rem; }
  .splash-title {
    font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    font-size: clamp(2.25rem, 10vw, 3.75rem);
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #1A1A1A;
    line-height: 1.1;
  }
  .splash-pink { color: #FF2D8B; }
  .splash-tagline {
    margin-top: 1.25rem;
    font-family: 'Lora', serif;
    font-size: clamp(1.05rem, 3.5vw, 1.35rem);
    font-style: italic;
    color: #4A443A;
    line-height: 1.5;
  }
  .splash-hint {
    margin-top: 2rem;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #6B6458;
  }
</style>
</head>
<body>
<div id="splash" class="splash-screen" role="button" tabindex="0" aria-label="Enter site">
  <div class="splash-inner">
    <h1 class="splash-title">HEAR <span class="splash-pink">ME OUT</span></h1>
    <p class="splash-tagline">no algorithm. just people.</p>
    <p class="splash-hint">Click to enter</p>
  </div>
</div>
<script>
(function () {
  function go() {
    window.location.href = 'about.html';
  }
  var s = document.getElementById('splash');
  s.addEventListener('click', go);
  s.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      go();
    }
  });
})();
</script>
</body>
</html>
